name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. v1.2.3). Defaults to git tag.'
        required: false

permissions:
  contents: write

jobs:
  # ── Build Go cross-compiled binaries ────────────────────────────────────────
  build-go:
    name: Build Go (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: glassbox-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: glassbox-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: glassbox-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: glassbox-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: glassbox-windows-amd64.exe

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w \
              -X 'github.com/dotandev/glassbox/internal/version.Version=${{ steps.version.outputs.version }}' \
              -X 'github.com/dotandev/glassbox/internal/version.CommitSHA=${{ steps.version.outputs.commit }}' \
              -X 'github.com/dotandev/glassbox/internal/version.BuildDate=${{ steps.version.outputs.build_date }}'" \
            -o dist/release/${{ matrix.artifact }} \
            ./cmd/glassbox

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}
          retention-days: 1

  # ── Build TypeScript / Node artifacts ───────────────────────────────────────
  build-ts:
    name: Build TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run TypeScript tests
        run: npm test -- --passWithNoTests

      - name: Upload TS dist
        uses: actions/upload-artifact@v4
        with:
          name: ts-dist
          path: dist/
          retention-days: 1

  # ── Run Go tests ─────────────────────────────────────────────────────────────
  test-go:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race ./...

  # ── Package: collect artifacts, checksums, archives ─────────────────────────
  package:
    name: Package release
    runs-on: ubuntu-latest
    needs: [build-go, build-ts, test-go]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Download all Go binaries
        uses: actions/download-artifact@v4
        with:
          pattern: go-*
          path: dist/release
          merge-multiple: true

      - name: Download TS dist
        uses: actions/download-artifact@v4
        with:
          name: ts-dist
          path: dist/ts

      - name: Write version metadata
        run: |
          printf 'version=%s\ncommit=%s\nbuild_date=%s\n' \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.commit }}" \
            "${{ steps.version.outputs.build_date }}" \
            > dist/release/version.txt

      - name: Create archives
        run: |
          cd dist/release
          for f in glassbox-linux-* glassbox-darwin-*; do
            [ -f "$f" ] || continue
            chmod +x "$f"
            tar czf "${f}.tar.gz" "$f"
            echo "  archived $f"
          done
          for f in glassbox-windows-*.exe; do
            [ -f "$f" ] || continue
            zip "${f%.exe}.zip" "$f"
            echo "  archived $f"
          done

      - name: Generate checksums
        run: |
          cd dist/release
          sha256sum *.tar.gz *.zip version.txt > checksums.sha256
          cat checksums.sha256

      - name: Verify release artifacts
        run: bash scripts/verify-release.sh dist/release

      - name: Upload packaged release
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: dist/release/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          body: |
            ## Glassbox ${{ steps.version.outputs.version }}

            **Commit:** `${{ steps.version.outputs.commit }}`
            **Built:** ${{ steps.version.outputs.build_date }}

            ### Installation

            Download the binary for your platform, make it executable, and place it on your `PATH`.

            ```bash
            # Linux (amd64)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/glassbox-linux-amd64.tar.gz | tar xz
            chmod +x glassbox-linux-amd64
            sudo mv glassbox-linux-amd64 /usr/local/bin/glassbox

            # macOS (Apple Silicon)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/glassbox-darwin-arm64.tar.gz | tar xz
            chmod +x glassbox-darwin-arm64
            sudo mv glassbox-darwin-arm64 /usr/local/bin/glassbox
            ```

            ### Verify checksums

            ```bash
            sha256sum --check checksums.sha256
            ```
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/checksums.sha256
            dist/release/version.txt

  # ── Determinism check: same hash on Linux and macOS ─────────────────────────
  determinism:
    name: Canonical JSON determinism (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run canonical JSON tests
        run: go test -v -run 'TestCanonicalJSON|TestGenerate_DeterministicHash|TestMarshalCanonical' ./internal/cmd/...

      - name: Save hash output
        run: |
          go test -v -run 'TestGenerate_DeterministicHash' ./internal/cmd/... \
            | tee hash_output_${{ matrix.os }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: hash-output-${{ matrix.os }}
          path: hash_output_${{ matrix.os }}.txt
          retention-days: 1

  compare-determinism:
    name: Compare canonical hashes across platforms
    runs-on: ubuntu-latest
    needs: determinism

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: hash-output-*
          merge-multiple: true

      - name: Compare outputs
        run: |
          echo "=== Ubuntu output ==="
          cat hash_output_ubuntu-latest.txt
          echo ""
          echo "=== macOS output ==="
          cat hash_output_macos-latest.txt
          echo ""
          # Both should contain PASS (no FAIL lines)
          if grep -q 'FAIL' hash_output_ubuntu-latest.txt || grep -q 'FAIL' hash_output_macos-latest.txt; then
            echo "[FAIL] determinism test failed on at least one platform"
            exit 1
          fi
          echo "[PASS] canonical JSON is deterministic across platforms"
